<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KU Facility</title>

<link rel="stylesheet" href="./css/style.css">

</head>

<body>

<div class="topbar">Kasetsart University</div>

<div class="container">

  <div class="left">
    <div class="title">
      <span class="ku">KU</span>
      <span class="facility">FACILITY</span>
    </div>

    <img class="logo"
      src="https://lh5.googleusercontent.com/proxy/qbxHivySAmM2hiuGTp-q0UfvgDii-6pWAQIlDal764IEMnPXj9CXMjSP1_0yl_l4M7RIM-VLdQsz64ndTLEdHF2EiVfkUSeHUXHFTjKr3cgKL90">

    <button id="loginBtn" class="menu-btn active">Login</button>
    <button id="registerBtn" class="menu-btn">Register</button>
  </div>

  <div class="right-wrapper">
    <div class="slider" id="slider">

      <!-- LOGIN -->
      <div class="panel">
        <div class="card">
          <label>Email</label>
          <input id="loginEmail">

          <label>Password</label>
          <input type="password" id="loginPassword">

          <button class="submit" onclick="login()">Login</button>
          <div class="link" onclick="showRegister()">Sign up</div>
        </div>
      </div>

      <!-- REGISTER -->
      <div class="panel">
        <div class="card">
          <label>Student ID</label>
          <input id="studentId">

          <label>Name</label>
          <input id="name">

          <label>Surname</label>
          <input id="surname">

          <label>Email</label>
          <input id="registerEmail">

          <label>Password</label>
          <input type="password" id="registerPassword">

          <button class="submit" onclick="register()">Register</button>
          <div class="link" onclick="showLogin()">Already have an account?</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/auth.js"></script>

</body>
</html>
