<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KU Facility</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}

body{
  height:100vh;
  background:#cfd2d4;
  display:flex;
  align-items:center;
  justify-content:center;
}

.topbar{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:52px;
  background:#0a5c34;
  color:white;
  display:flex;
  align-items:center;
  padding-left:22px;
  font-weight:500;
}

.container{
  width:1120px;
  height:640px;
  background:#e6e8ea;
  border-radius:6px;
  box-shadow:0 6px 12px rgba(0,0,0,.18);
  display:flex;
  overflow:hidden;
}

/* LEFT */
.left{
  width:340px;
  background:#efefef;
  margin:26px;
  border-radius:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  box-shadow:0 2px 4px rgba(0,0,0,.15);
}

.title{
  font-size:30px;
  font-weight:800;
  color:#145a32;
}

.title span{position:relative;}
.title span::after{
  content:"";
  position:absolute;
  left:2px;
  bottom:-5px;
  width:50px;
  height:6px;
  background:#d4e157;
}

.logo{width:120px;margin:6px 0 12px;}

.menu-btn{
  width:75%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:600;
  background:#e3e3e3;
  color:#9aa0a6;
  cursor:pointer;
  transition:.25s;
}

.menu-btn.active{
  background:#f7f7f7;
  color:#145a32;
  box-shadow: inset 0 0 0 2px #ececec;
}

/* RIGHT SLIDER */
.right-wrapper{
  flex:1;
  overflow:hidden;
  position:relative;
  display:flex;
  align-items:center;
}

.slider{
  display:flex;
  width:200%; /* ต้องใหญ่ 2 เท่า เพราะมี 2 panel */
  height:100%;
  transition:transform .55s cubic-bezier(.65,0,.35,1);
}

.panel{
  min-width:100%; /* แต่ละ panel เท่ากับพื้นที่ฝั่งขวาพอดี */
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:360px;
  background:white;
  padding:26px;
  border-radius:14px;
  box-shadow:0 4px 8px rgba(0,0,0,.25);
  display:flex;
  flex-direction:column;
  gap:10px;
}

label{font-size:12px;color:#555;}

input{
  height:34px;
  border:none;
  border-radius:8px;
  background:#dde2e6;
  padding:6px 10px;
  outline:none;
}

.submit{
  margin-top:10px;
  height:42px;
  border:none;
  border-radius:12px;
  background:#0a5c34;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.link{
  text-align:right;
  font-size:11px;
  text-decoration:underline;
  margin-top:2px;
  cursor:pointer;
}

</style>
</head>
<body>

<div class="topbar">Kasetsart University</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="title"><span>KU</span> FACILITY</div>
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/en/thumb/4/42/Kasetsart_University_Seal.svg/1200px-Kasetsart_University_Seal.svg.png">

    <button id="loginBtn" class="menu-btn active" onclick="showLogin()">Login</button>
    <button id="registerBtn" class="menu-btn" onclick="showRegister()">Register</button>
  </div>

  <!-- RIGHT -->
  <div class="right-wrapper">
    <div class="slider" id="slider">

      <!-- LOGIN -->
      <div class="panel">
        <div class="card">
          <label>Email</label>
          <input>

          <label>Password</label>
          <input type="password">

          <button class="submit">Login</button>
          <div class="link" onclick="showRegister()">Sign up</div>
        </div>
      </div>

      <!-- REGISTER -->
      <div class="panel">
        <div class="card">
          <label>Student ID</label>
          <input>

          <label>Name</label>
          <input>

          <label>Surname</label>
          <input>

          <label>Email</label>
          <input>

          <label>Password</label>
          <input type="password">

          <button class="submit">Register</button>
          <div class="link" onclick="showLogin()">Already have an account?</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>

const slider=document.getElementById('slider');
const loginBtn=document.getElementById('loginBtn');
const registerBtn=document.getElementById('registerBtn');

function showRegister(){
  slider.style.transform='translateX(-100%)'; /* เลื่อนไปเต็ม panel */
  loginBtn.classList.remove('active');
  registerBtn.classList.add('active');
}

function showLogin(){
  slider.style.transform='translateX(0%)';
  registerBtn.classList.remove('active');
  loginBtn.classList.add('active');
}

</script>

</body>
</html>
